<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון המרה חי - מט"ח</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .currency-group { margin-bottom: 15px; text-align: right; }
        label { font-weight: bold; font-size: 15px; color: #333; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .flag { font-size: 22px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .status { font-size: 14px; margin-top: 15px; color: #555; line-height: 1.5; }
        .loading { color: #007bff; }
    </style>
</head>
<body>

<div class="card">
    <h2>המרה מעודכנת (Live)</h2>

    <div class="currency-group">
        <label for="ILS"><span class="flag">🇮🇱</span> שקל חדש (ILS):</label>
        <input type="number" id="ILS" placeholder="0" oninput="convert('ILS')">
    </div>
    
    <div class="currency-group">
        <label for="CZK"><span class="flag">🇨🇿</span> קרונה צ'כית (CZK):</label>
        <input type="number" id="CZK" placeholder="0" oninput="convert('CZK')">
    </div>

    <div class="currency-group">
        <label for="EUR"><span class="flag">🇪🇺</span> אירו (EUR):</label>
        <input type="number" id="EUR" placeholder="0" oninput="convert('EUR')">
    </div>

    <div class="currency-group">
        <label for="USD"><span class="flag">🇺🇸</span> דולר ארה"ב (USD):</label>
        <input type="number" id="USD" placeholder="0" oninput="convert('USD')">
    </div>

    <div id="status" class="status loading">מעדכן שערי חליפין...</div>
</div>

<script>
    let rates = { USD: 1, ILS: 0, CZK: 0, EUR: 0 };
    const fallbackRates = { USD: 1, ILS: 3.75, CZK: 23.5, EUR: 0.92 }; 

    async function fetchRates() {
        try {
            const response = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await response.json();
            
            rates.USD = 1;
            rates.ILS = data.rates.ILS;
            rates.CZK = data.rates.CZK;
            rates.EUR = data.rates.EUR;
            
            const eurToIls = rates.ILS / rates.EUR;
            const usdToIls = rates.ILS;
            const ilsToCzk = rates.CZK / rates.ILS;

            document.getElementById('status').innerHTML = 
                `<strong>שערים נוכחיים:</strong><br>` +
                `1 אירו = ${eurToIls.toFixed(2)} ש"ח<br>` +
                `1 דולר = ${usdToIls.toFixed(2)} ש"ח<br>` +
                `1 ש"ח = ${ilsToCzk.toFixed(2)} קרונה`;
            document.getElementById('status').classList.remove('loading');
        } catch (error) {
            rates = fallbackRates;
            document.getElementById('status').innerText = "שגיאה בעדכון. משתמש בשערים משוערים.";
            document.getElementById('status').style.color = "red";
        }
    }

    function convert(sourceCurrency) {
        if (!rates.ILS) return;

        const inputVal = parseFloat(document.getElementById(sourceCurrency).value);
        const currencies = ['ILS', 'CZK', 'EUR', 'USD'];

        if (isNaN(inputVal)) {
            currencies.forEach(currency => {
                if (currency !== sourceCurrency) document.getElementById(currency).value = '';
            });
            return;
        }

        const baseUsd = inputVal / rates[sourceCurrency];

        currencies.forEach(currency => {
            if (currency !== sourceCurrency) {
                document.getElementById(currency).value = (baseUsd * rates[currency]).toFixed(2);
            }
        });
    }

    fetchRates();
</script>

</body>
</html>
